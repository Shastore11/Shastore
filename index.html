<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaos Distro Murah Pria Dan Wanita</title>

<style>
body {
  font-family: Arial, sans-saerif;
  margin: 0;
  background: #f5f5f5;
}

/* HEADER */
header {
  background: black;
  color: white;
  text-align: center;
  padding: 15px;
  font-size: 20px;
}

/* HERO */
.hero {
  background: white;
  text-align: center;
  padding: 20px;
}

.hero img {
  width: 100%;
  max-width: 280px;
  border-radius: 10px;
}

.hero h2 {
  font-size: 18px;
  margin: 10px 0;
}

.hero p {
  font-size: 14px;
  margin: 0;
}

/* BUTTON 2 COL */
.cta-buttons {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 15px;
}

.btn {
  width: 45%;
  padding: 12px;
  border-radius: 8px;
  text-decoration: none;
  color: white;
  font-weight: bold;
  text-align: center;
}

.shopee { background: red; }
.tiktok { background: black; }

/* REVIEW */
.review {
  margin-top: 15px;
  font-size: 14px;
}

/* CONTACT */
.contact-box {
  text-align: center;
  padding: 15px;
  background: white;
  position: relative;
}

.contact-btn {
  padding: 10px 20px;
  border: none;
  background: black;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

.social-menu {
  position: absolute;
  left: 50%;
  transform: translateX(-50%) translateY(-10px);
  top: 50px;
  background: white;
  padding: 10px;
  border-radius: 10px;
  display: flex;
  gap: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.15);

  opacity: 0;
  visibility: hidden;
  transition: 0.3s;
}

.social-menu.show {
  opacity: 1;
  visibility: visible;
  transform: translateX(-50%) translateY(0);
}

.social-menu img {
  width: 28px;
}
</style>
</head>

<body>

<header>
🔥Kaos Distro Murah Pria dan Wanita🔥
</header>

<!-- HERO -->
<div class="hero">
  <a href="https://ibb.co.com/dswwGdtm"><img src="https://i.ibb.co.com/dswwGdtm/Untitled-1-1.webp" alt="Untitled-1-1" border="0"></a>

  <h2>✔️ Bisa COD & Dipercaya</h2>
  <p>Pengiriman Seluruh Indonesia</p>

  <div class="cta-buttons">
    <a href="https://shopee.co.id/shastore11" target="_blank">
      <img src="https://img.icons8.com/color/48/shopee.png"/><a>
    <a href="https://tiktok.com/@Shastore11" target="_blank">
      <img src="https://img.icons8.com/ios-filled/50/000000/tiktok.png"/><a>
  </div><a>

  <div class="review">
    ⭐⭐⭐⭐⭐  <br><br>

    <p>Bahan Cotton 30s , Lembut, Adem, nyaman dipakai sehari-hari, dan banyak repeat order!</p>
</div>

<!-- HUBUNGI -->
<div class="contact-box">
  <button id="btnContact" class="contact-btn">Hubungi Kami</button>

  <div id="socialMenu" class="social-menu">
    <a href="https://tiktok.com/@Shastore11" target="_blank">
      <img src="https://img.icons8.com/ios-filled/50/000000/tiktok.png"/>
    <a href="https://shopee.co.id/shastore11" target="_blank">
      <img src="https://img.icons8.com/color/48/shopee.png"/>
  </div>
</div>

<script>
const btn = document.getElementById("btnContact");
const menu = document.getElementById("socialMenu");

btn.addEventListener("click", function(e) {
  e.stopPropagation();
  menu.classList.toggle("show");
});

document.addEventListener("click", function() {
  menu.classList.remove("show");
});
</script>

</body>
</html>
